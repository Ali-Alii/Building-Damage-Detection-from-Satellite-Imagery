name: aerodamage
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults

dependencies:
  - python=3.10
  - pip

  # ── PyTorch (CUDA 11.8) ──────────────────────────────────────────────────
  - pytorch>=2.0.0
  - torchvision>=0.15.0
  - pytorch-cuda=11.8

  # ── Data & image processing ──────────────────────────────────────────────
  - pillow>=9.5.0
  - numpy>=1.24.0
  - opencv>=4.8.0

  # ── Training & evaluation ────────────────────────────────────────────────
  - tqdm>=4.65.0
  - scikit-learn>=1.3.0

  # ── Visualization ────────────────────────────────────────────────────────
  - matplotlib>=3.7.0
  - seaborn>=0.12.0

  # ── Notebook ─────────────────────────────────────────────────────────────
  - jupyter
  - ipywidgets

  # ── pip-only packages ────────────────────────────────────────────────────
  - pip:
    - fastapi>=0.100.0
    - uvicorn>=0.23.0
    - python-multipart>=0.0.6
